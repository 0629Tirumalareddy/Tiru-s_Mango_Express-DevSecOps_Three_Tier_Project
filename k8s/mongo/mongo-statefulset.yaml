apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo
  namespace: mango-express
spec:
  serviceName: mongo-service
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:6
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
          env:
            - name: MONGO_INITDB_DATABASE
              value: mangoexpress
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
