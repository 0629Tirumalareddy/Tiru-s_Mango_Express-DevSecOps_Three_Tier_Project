apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  namespaceSelector:
    matchNames:
      - mango-express
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: "5000"
      path: /metrics
      interval: 15s
